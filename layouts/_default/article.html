{{ define "main" }}

<article class="pb-24 relative max-w-3xl mx-auto px-3 sm:px-9 pt-32">

  <h1 class="block text-h2 font-bold font-display leading-none">{{ .Title }}</h1>

  {{ if .Params.featuredGif }}
  {{ $gifSrc := .Params.featuredGif }}
  {{ if not (hasPrefix $gifSrc "/") }}
    {{ $gifSrc = printf "%sgallery/%s" .Permalink .Params.featuredGif }}
  {{ end }}
  <figure class="mt-8 mb-2 w-full overflow-hidden rounded-lg bg-neutral-800">
    <img src="{{ $gifSrc }}" alt="" class="w-full h-[200px] object-cover object-[0%_35%]" loading="lazy">
  </figure>
  {{ end }}

  <div class="mt-5 text-lg prose prose-invert">
    {{ .Content }}
  </div>

  {{ partial "gallery.html" . }}

</article>


{{ end }}
